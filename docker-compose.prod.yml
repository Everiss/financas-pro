version: '3.9'

# Uso em produção (AWS EC2 + RDS):
#   docker compose -f docker-compose.prod.yml up -d

services:
  backend:
    image: ${ECR_REGISTRY}/financas-backend:${IMAGE_TAG:-latest}
    container_name: financas_backend
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}         # RDS endpoint
      PORT: 5000
      FRONTEND_URL: ${FRONTEND_URL}         # ex: https://seudominio.com.br
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      PLUGGY_CLIENT_ID: ${PLUGGY_CLIENT_ID}
      PLUGGY_CLIENT_SECRET: ${PLUGGY_CLIENT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
    expose:
      - "5000"

  frontend:
    image: ${ECR_REGISTRY}/financas-frontend:${IMAGE_TAG:-latest}
    container_name: financas_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Monte certificados SSL aqui (Let's Encrypt via certbot)
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
