version: '3.9'

# ─── Deploy em VPS ────────────────────────────────────────────────────────────
#
#  1. Copie .env.prod.example → .env.prod e preencha os valores
#  2. Edite financas-front/nginx.ssl.conf → substitua SEU_DOMINIO pelo domínio real
#  3. Na VPS: docker compose -f docker-compose.prod.yml up -d --build
#
# SSL: emite/renova certificados com:
#   docker compose -f docker-compose.prod.yml run --rm certbot certonly \
#     --webroot -w /var/www/certbot -d seudominio.com.br -d www.seudominio.com.br \
#     --email seuemail@gmail.com --agree-tos --no-eff-email
#
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── MySQL ──────────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: financas_db
    restart: always
    env_file: .env.prod
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: financas_pro
      MYSQL_ROOT_HOST: '%'
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 15

  # ── Backend NestJS ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./financas-back
      dockerfile: Dockerfile
    container_name: financas_backend
    restart: always
    env_file: .env.prod
    environment:
      DATABASE_URL: mysql://root:${DB_ROOT_PASSWORD}@db:3306/financas_pro
      PORT: 5000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    expose:
      - "5000"

  # ── Frontend React + Nginx ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./financas-front
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: financas_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Nginx config com SSL (substitua SEU_DOMINIO no arquivo)
      - ./financas-front/nginx.ssl.conf:/etc/nginx/conf.d/default.conf:ro
      # Certificados Let's Encrypt (gerados pelo certbot abaixo)
      - letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    networks:
      - internal

  # ── Certbot (emissão/renovação de SSL) ────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: financas_certbot
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Executa manualmente — não fica rodando
    profiles: ["certbot"]
    entrypoint: ""
    command: "--version"

volumes:
  db_data:
  letsencrypt:
  certbot_www:

networks:
  internal:
    driver: bridge
